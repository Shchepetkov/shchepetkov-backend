# =============================================================================
# DEVELOPMENT PROFILE CONFIGURATION
# =============================================================================

# -----------------------------------------------------------------------------
# H2 DATABASE (file-based, data persists between restarts)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/mysite_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------------
jwt.secret=${JWT_SECRET:dev-only-local-secret-key-change-me-in-production-must-be-at-least-64-chars-long!}

# -----------------------------------------------------------------------------
# CORS for local frontend dev servers
# -----------------------------------------------------------------------------
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
